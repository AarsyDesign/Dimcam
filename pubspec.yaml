name: dimsumia_manager
description: "Dimsumia Manager — Aplikasi manajemen usaha dimsum dengan tema girly premium."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Local database
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4

  # File operations
  share_plus: ^10.1.0
  file_picker: ^11.0.1

  # UI helpers
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  intl: ^0.19.0
  flutter_svg: ^2.0.10+1
  pdf: ^3.10.8
  printing: ^5.12.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  sqflite_common_ffi: ^2.3.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFD1DC"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
